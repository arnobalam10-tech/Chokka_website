name: Keep Chokka Alive

on:
  schedule:
    # Runs every 14 minutes (Render sleeps after 15 mins of inactivity)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to run this manually from GitHub actions tab for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep Chokka Stack Alive
        run: |
          echo "Pinging Frontend..."
          curl -L https://chokka.shop
          
          echo "Pinging Backend /health..."
          curl -L https://chokka-server.onrender.com/health
