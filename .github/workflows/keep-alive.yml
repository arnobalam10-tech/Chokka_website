name: Keep Chokka Alive

on:
  schedule:
    # Runs every 14 minutes (Render sleeps after 15 mins of inactivity)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to run this manually from GitHub actions tab for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep Chokka Stack Alive
        run: |
          echo "Pinging Frontend..."
          curl -I https://chokka.shop
          
          echo "Pinging Backend Root..."
          curl -I https://chokka-server.onrender.com
          
          echo "Pinging API Products Endpoint..."
          curl -I https://chokka-server.onrender.com/api/products
